<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <header>
        <div class="title">
            <h1>FLASHCARDS ЕБАНЫЕ</h1>
        </div>
    </header>
    <main>
        <div class="head">
            <form data-learned_temp="null">
                <div>New card</div>
                <div class="fields">
                    <div class="field">
                        <label for="input-question">Question:</label>
                        <input type="text" name="question" id="input-question">
                    </div>
                    <div class="field">
                        <label for="input-answer">Answer:</label>
                        <input type="text" name="answer" id="input-answer">
                    </div>
                </div>
                <button type="submit">Add</button>
            </form>
            <div class="filters">
                
            </div>
        </div>
        <table id="flashcards-deck">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>QUESTION</th>
                    <th>ANSWER</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="flashcards-learn">
            <div id="controls">
                <button id="backward">Backward</button>
                <button id="forward">Forward</button>
            </div>
            <div id="flashcards-window"></div>
        </div>
    </main>
    <script src="static/main.js" type="module"></script>
</body>
</html>
