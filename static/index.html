<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <form>
        <label for="input-question">Question: <input type="text" name="question" id="input-question"></label>
        <label for="input-answer">Answer: <input type="text" name="answer" id="input-answer"></label>
        <button type="submit">Add</button>
    </form>
    <table id="flashcards-deck">
        <thead>
            <tr>
                <th>ID</th>
                <th>QUESTION</th>
                <th>ANSWER</th>
                <th>LEARNED</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            
        </tbody>
    </table>
    <script src="static/window.js" type="module"></script>
    <script src="static/form.js" type="module"></script>
</body>
</html>
