<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <form data-learned_temp="null">
        <label for="input-question">Question: <input type="text" name="question" id="input-question"></label>
        <label for="input-answer">Answer: <input type="text" name="answer" id="input-answer"></label>
        <button type="submit">Add</button>
    </form>
    <table id="flashcards-deck">
        <thead>
            <tr>
                <th>ID</th>
                <th>QUESTION</th>
                <th>ANSWER</th>
                <th>LEARNED</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            
        </tbody>
    </table>
    <div id="flashcards-learn">
        <div id="controls">
            <button id="backward">Backward</button>
            <button id="forward">Forward</button>
        </div>
        <div id="flashcards-window"></div>
    </div>
    <script src="static/main.js" type="module"></script>
</body>
</html>
